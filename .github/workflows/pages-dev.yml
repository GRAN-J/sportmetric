name: Deploy (Dev)

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - develop

permissions:
  contents: write

concurrency:
  group: pages-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (Dev)
        run: npm run build:dev

      - name: Deploy to gh-pages (/dev)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          keep_files: true
